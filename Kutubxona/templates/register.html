{% extends 'base.html' %}

{% block content %}
<style>
    .register-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 80vh;
        font-family: 'Segoe UI', Arial, sans-serif;
    }

    .register-card {
        background: #ffffff;
        padding: 25px;
        border-radius: 8px;
        border: 1px solid #ddd;
        width: 100%;
        max-width: 350px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .register-card h2 {
        text-align: center;
        margin-bottom: 20px;
        font-size: 24px;
        color: #333;
    }

    .form-group {
        margin-bottom: 15px;
    }

    label {
        display: block;
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 5px;
        color: #444;
    }

    input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
        font-size: 14px;
    }

    .btn-submit {
        width: 100%;
        padding: 12px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 10px;
        transition: background 0.2s;
    }

    .btn-submit:hover {
        background-color: #0056b3;
    }

    .auth-links {
        text-align: center;
        margin-top: 15px;
        font-size: 13px;
    }
</style>

<div class="register-wrapper">
    <div class="register-card">
        <h2>Ro'yxatdan o'tish</h2>
        
        <form method="POST">
            {% csrf_token %}
            
            <div class="form-group">
                <label>Foydalanuvchi nomi</label>
                <input type="text" name="username" placeholder="Username" required>
            </div>

            <div class="form-group">
                <label>Parol</label>
                <input type="password" name="password" placeholder="Parol" required>
            </div>

            <button type="submit" class="btn-submit">Saqlash</button>
        </form>

        <div class="auth-links">
            <p>Profilingiz bormi? <a href="{% url 'login' %}">Kirish</a></p>
        </div>
    </div>
</div>
{% endblock %}
