<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sozlamalar</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #5f6bdc, #8c6bdc);
            min-height: 100vh;
        }

        .navbar {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.1);
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .settings-card {
            width: 100%;
            max-width: 420px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .settings-card h2 {
            margin-top: 0;
            margin-bottom: 25px;
            text-align: center;
            color: #333;
        }

        label {
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .save-btn { background: #28a745; }
        .logout-btn { background: #e53935; margin-top: 10px; }
        a { text-decoration: none; }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="{% url 'home' %}">Bosh sahifa</a>
        <a href="{% url 'about' %}">Kutubxona haqida</a>
        <a href="{% url 'favorit' %}">Sevimli kitoblar</a>
        <a href="{% url 'kitoblar' %}">Kitoblar ro'yxati</a>
        <a href="{% url 'sozlamalar' %}">Sozlamalar</a>
    </div>

    <div class="container">
        <div class="settings-card">
            <h2>⚙ Sozlamalar</h2>

            <form action="{% url 'kabinet' %}" method="POST" autocomplete="off">
                {% csrf_token %}

                <label for="username">Foydalanuvchi nomi</label>
                <input type="text" id="username" name="username" placeholder="Foydalanuvchi nomini kiriting" value="" autocomplete="one-time-code" required>

                <label for="password">Yangi parol</label>
                <input type="password" id="password" name="password" placeholder="Yangi parolni kiriting" value="" autocomplete="new-password" required>

                <button type="submit" class="save-btn">O'zgarishlarni saqlash</button>
            </form>

            <hr style="margin: 25px 0; border: 0; border-top: 1px solid #eee;">

            <label>Tizim tili</label>
            <select>
                <option>O'zbek</option>
                <option>Русский</option>
                <option>English</option>
            </select>

            <a href="{% url 'logout' %}">
                <button type="button" class="logout-btn">Akkauntdan chiqish</button>
            </a>
        </div>
    </div>

</body>
</html>
